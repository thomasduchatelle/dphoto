name: Feature branch continuous integration
on:
  push:
    branches-ignore:
      - next
      - main
      - actions
      - update-snapshots

jobs:
  semver:
    name: "Next Semantic Version"
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.semver.outputs.MajorMinorPatch }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: '5.x'
      - name: Determine Version
        id: semver
        uses: gittools/actions/gitversion/execute@v1.1.1
        with:
          useConfigFile: true

  test-infra-data:
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      TF_WORKSPACE: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup terraform
        uses: ./.github/actions/install-terraform
        with:
          tf-api-token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        id: init
        run: |
          cd deployments/infra-data
          terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Plan (dev)
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Save plan in file
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        run: |
          echo "$PLAN" > terraform-plan-dev.log

      - name: Upload Plan (dev)
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev.log
          path: terraform-plan-dev.log

      - name: Publish Plan (dev)
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = octokit.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: '${{ github.ref }}'
            });
            
            if (!prs) {
              console.log("No open PR for this branch [${{ github.ref }}]
              return
            }
            
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: prs[0].number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  test-go-code:
    timeout-minutes: 10
    runs-on: ubuntu-latest
#    if: ${{ success() && needs.update-snapshots.outputs.skip_downstream == 'false' || !cancelled() && needs.update-snapshots.result == 'skipped' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup GO
        uses: ./.github/actions/install-go
      - name: start mock services
        run: docker-compose up -d
      - run: make test-go

  test-ts-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_AUTO_COMMIT }}
      - name: Setup NODE
        uses: ./.github/actions/install-node

      - name: Generate snapshots
        if: ${{ contains(github.event.head_commit.message, '+update-snapshots') }}
        run: make update-snapshots

      - name: Test and build WEB UI
        run: make test-web build-web

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: storybook-snapshots
          path: web/src/stories/__image_snapshots__/__diff_output__/
